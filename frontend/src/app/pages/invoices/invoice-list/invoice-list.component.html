<h2>Notas Fiscais</h2>

<button (click)="openModal()">Nova Nota</button>

<div *ngIf="loading()">Carregando...</div>

<table *ngIf="!loading()" border="1">
  <thead>
    <tr>
      <th>Número</th>
      <th>Cliente</th>
      <th>Total</th>
      <th>Status</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let i of invoices(); trackBy: trackById">
      <td>{{ i.number }}</td>
      <td>{{ i.customerName }}</td>
      <td>{{ i.total }}</td>
      <td>{{ i.status }}</td>
      <td>
        <button (click)="openDetailModal(i)">Ver</button>
      </td>
    </tr>
  </tbody>
</table>

<app-invoice-form-modal
  *ngIf="showModal()"
  (close)="closeModal()"
  (created)="onInvoiceCreated($event)"
  (printed)="onInvoicePrinted()">
</app-invoice-form-modal>

<!-- botão de abrir detalhe -->


<app-invoice-detail-modal
  *ngIf="showDetailModal()"
  [invoice]="selectedInvoice"
  (close)="closeDetailModal()"
  (deleted)="onInvoiceDeleted($event)"
  (updated)="onInvoiceUpdated($event)">
</app-invoice-detail-modal>
