services:
  postgres:
    image: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: notas
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

  inventory:
    build: ./services/inventory
    depends_on:
      - postgres

  billing:
    build: ./services/billing
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"