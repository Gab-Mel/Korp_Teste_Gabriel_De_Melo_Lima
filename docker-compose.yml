services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  inventory:
    build: ./services/inventory
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=inventory_db;Username=admin;Password=admin

  billing:
    build: ./services/billing
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5002:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=billing_db;Username=admin;Password=admin

  gateway:
    build: ./gateway
    ports:
      - "5000:8080"
    depends_on:
      - billing
      - inventory

volumes:
  pgdata: